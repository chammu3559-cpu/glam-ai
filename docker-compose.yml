version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: glam-ai-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - glam-ai-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: glam-ai-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - JWT_SECRET=${JWT_SECRET}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:8000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
    networks:
      - glam-ai-network

  mongodb:
    image: mongo:7.0
    container_name: glam-ai-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=glam-ai
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password
    volumes:
      - mongodb_data:/data/db
    networks:
      - glam-ai-network

volumes:
  mongodb_data:

networks:
  glam-ai-network:
    driver: bridge
